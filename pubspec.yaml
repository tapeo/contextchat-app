name: contextchat
description: "An AI chat app with special focus on handling projects context."
publish_to: "none"

version: 0.7.1+8

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  equatable: ^2.0.7
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  http: ^1.6.0
  html: ^0.15.6
  crypto: ^3.0.7
  collection: ^1.19.1
  path: ^1.9.1
  file_picker: ^10.3.10
  permission_handler: ^11.3.1
  gal: ^2.3.2
  archive: ^4.0.9
  xml: ^6.6.1
  syncfusion_flutter_pdf: ^32.2.9
  google_fonts: ^8.0.2
  lucide_icons_flutter: ^3.1.10
  flutter_markdown_plus: ^1.0.7
  icons_launcher: ^3.1.0
  flutter_secure_storage: ^10.0.0
  github: ^9.25.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

icons_launcher:
  image_path: "assets/logo.png"
  platforms:
    android:
      enable: true
      adaptive_background_image: "assets/background.png"
      adaptive_foreground_image: "assets/foreground.png"
    ios:
      enable: true
    macos:
      enable: true

flutter_native_splash:
  image: assets/foreground.png
  background_image: assets/background.png
  android_12:
    image: assets/foreground.png
    color: "#ffffff"
    icon_background_color: "#ffffff"
